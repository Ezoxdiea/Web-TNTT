<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Form Đăng Nhập</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="login-box">

<div class="logo">★</div>

<h2>ĐĂNG NHẬP!</h2>

<form>

<div class="input-box">
<label>TÀI KHOẢN / EMAIL</label>
<input type="text" placeholder="Nhập email hoặc số điện thoại">
</div>

<div class="input-box">
<label>MẬT KHẨU</label>
<input type="password" placeholder="Nhập mật khẩu">
</div>

<div class="row">
<label><input type="checkbox"> Ghi nhớ mật khẩu</label>
<a href="#">Quên mật khẩu?</a>
</div>

<button>ĐĂNG NHẬP NGAY</button>

<div class="divider">HOẶC ĐĂNG NHẬP BẰNG</div>

<div class="social">
<button>Google</button>
<button>Facebook</button>
</div>

<div class="signup">
Chưa có tài khoản? <a href="#">Đăng ký thành viên</a>
</div>

</form>

</div>

</body>
</html>
